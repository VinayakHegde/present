<!DOCTYPE html>
<html lang="en">
<!--
  Akeneo System Design Interview — calculated metrics platform (prep only)
  Serve: python3 -m http.server 8080 → http://localhost:8080/akeneo/
  Print: Cmd/Ctrl+P — diagram is print-friendly
-->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculated Metrics · Two-Tier Read Model</title>
  <style>
    :root {
      --bg: #0b1120;
      --border: #334155;
      --accent: #10b981;
      --data: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(16,185,129,0.10), transparent 60%),
        radial-gradient(1000px 500px at 0% 0%, rgba(56,189,248,0.08), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: none; margin: 0; padding: 1rem; }

    .diagram-wrap {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      overflow-x: auto;
      box-shadow: none;
    }
    svg { width: 100%; height: auto; min-width: 1100px; display: block; }

    /* containers */
    .lane-sys { fill: rgba(148,163,184,0.035); stroke: #475569; stroke-width: 1.5; }
    .lane-ext { fill: rgba(56,189,248,0.05); stroke: #38bdf8; stroke-width: 1.6; }
    .lane-label { fill: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; }
    .divider { stroke: rgba(255,255,255,0.16); stroke-width: 1; stroke-dasharray: 3 4; }

    .card { filter: url(#shadow); }
    .cat-ext  { fill: url(#g-ext);  stroke: #6b7a90; stroke-width: 1.4; }
    .cat-data { fill: url(#g-data); stroke: var(--data); stroke-width: 1.5; }
    .cat-own  { fill: url(#g-own);  stroke: var(--accent); stroke-width: 1.5; }

    .box-title { fill: #fff; font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; }
    .box-sub { fill: var(--muted); font-size: 10px; }

    .edge { stroke: #5b6b82; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .edge-own { stroke: var(--accent); }
    .edge-data { stroke: var(--data); }
    .edge-hot { stroke: var(--accent); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .edge-cold { stroke: var(--data); stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .edge-dash { stroke-dasharray: 6 5; animation: march 0.9s linear infinite; }

    @keyframes march { to { stroke-dashoffset: -22; } }
    @media (prefers-reduced-motion: reduce) { .edge-dash { animation: none; } }

    .edge-label {
      fill: var(--text); font-size: 10.5px; font-weight: 600;
      paint-order: stroke; stroke: #0a0f1e; stroke-width: 4.5px; stroke-linejoin: round;
    }
    .hot-label { fill: #6ee7b7; font-weight: 700; }
    .cold-label { fill: #7dd3fc; font-weight: 700; }

    @media print {
      body { background: #fff; color: #111; }
      .diagram-wrap { background: #fff; box-shadow: none; }
      .box-title { fill: #111; } .box-sub { fill: #444; }
      .edge-label { fill: #111; stroke: #fff; }
      .hot-label { fill: #047857; } .cold-label { fill: #0369a1; }
      .lane-label { fill: #555; }
      .edge-dash { animation: none; }
    }
  </style>
</head>
<body>
<main>
  <div class="diagram-wrap">
    <svg viewBox="0 0 1240 780" role="img" aria-label="Calculated metrics platform component diagram">
      <defs>
        <linearGradient id="g-ext" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2a3650"/><stop offset="1" stop-color="#1a2335"/>
        </linearGradient>
        <linearGradient id="g-data" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#123450"/><stop offset="1" stop-color="#0c2032"/>
        </linearGradient>
        <linearGradient id="g-own" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#10402f"/><stop offset="1" stop-color="#0b2a20"/>
        </linearGradient>

        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1" fill="#16213a"/>
        </pattern>

        <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
        </filter>

        <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#5b6b82"/>
        </marker>
        <marker id="ah-own" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#10b981"/>
        </marker>
        <marker id="ah-data" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#38bdf8"/>
        </marker>
      </defs>

      <!-- backdrop dot grid -->
      <rect x="0" y="0" width="1240" height="780" fill="url(#dots)"/>

      <!-- ============ CONTAINERS ============ -->
      <rect class="lane-sys" x="30" y="175" width="1180" height="575" rx="18"/>
      <text class="lane-label" x="50" y="202">OUR SYSTEM · TRUST BOUNDARY</text>

      <rect class="lane-ext" x="225" y="20" width="560" height="132" rx="16"/>
      <text class="lane-label" x="243" y="42" fill="#7dd3fc">EXTERNAL · DATA SOURCES</text>

      <!-- ============ EDGES (under boxes) ============ -->

      <!-- External lane: Source -> Extractors -> Data Lake -->
      <line class="edge" x1="395" y1="103" x2="425" y2="103" marker-end="url(#ah)"/>
      <text class="edge-label" x="410" y="62" text-anchor="middle">send docs</text>
      <line class="edge edge-data" x1="575" y1="103" x2="605" y2="103" marker-end="url(#ah-data)"/>
      <text class="edge-label" x="590" y="62" text-anchor="middle">write raw</text>

      <!-- Data Lake -> Ingestion Queue (into system; raw is immutable + replayable) -->
      <polyline class="edge edge-data edge-dash" points="680,136 680,200 455,200 455,235" marker-end="url(#ah-data)"/>
      <text class="edge-label" x="565" y="194" text-anchor="middle">raw events · replayable</text>

      <!-- Ingestion Queue -> Ingestion Workers -->
      <line class="edge edge-own" x1="530" y1="275" x2="600" y2="275" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="565" y="228" text-anchor="middle">consume</text>

      <!-- Ingestion Workers -> Normalised Facts store -->
      <line class="edge edge-own" x1="760" y1="275" x2="810" y2="275" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="785" y="228" text-anchor="middle">normalise</text>

      <!-- Ingestion Workers -> Dead-Letter Queue (poison / max retries) -->
      <line class="edge edge-dash" x1="680" y1="315" x2="680" y2="328" marker-end="url(#ah)"/>
      <text class="edge-label" x="724" y="326" text-anchor="start">max retries</text>

      <!-- DLQ -> Ingestion Queue (replay to recover lost events) -->
      <polyline class="edge edge-data edge-dash" points="600,351 455,351 455,315" marker-end="url(#ah-data)"/>
      <text class="edge-label" x="527" y="345" text-anchor="middle">replay</text>

      <!-- Normalised Facts store -> Materialisation Queue (source refresh) -->
      <polyline class="edge edge-data edge-dash" points="850,315 850,393 327,393 327,400" marker-end="url(#ah-data)"/>
      <text class="edge-label" x="438" y="384" text-anchor="middle">source refresh → recompute</text>

      <!-- Metric definition -> Materialisation queue -->
      <line class="edge edge-own" x1="210" y1="440" x2="250" y2="440" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="230" y="388" text-anchor="middle">on change</text>

      <!-- Snapshot worker -> Materialised store -->
      <line class="edge edge-own" x1="560" y1="440" x2="600" y2="440" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="580" y="388" text-anchor="middle">write snapshot</text>

      <!-- Materialised store -> Notification service -->
      <line class="edge edge-own edge-dash" x1="760" y1="440" x2="1000" y2="440" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="880" y="432" text-anchor="middle">snapshot-ready event</text>

      <!-- Notification service -> UI (notify, outer bottom track) -->
      <polyline class="edge edge-dash" points="1085,480 1085,714 190,714 190,680" marker-end="url(#ah)"/>
      <text class="edge-label" x="630" y="708" text-anchor="middle">notify tenants · email / in-app</text>

      <!-- Read entry: UI -> BFF -> Fast api -->
      <line class="edge" x1="260" y1="640" x2="320" y2="640" marker-end="url(#ah)"/>
      <text class="edge-label" x="290" y="590" text-anchor="middle">request</text>
      <line class="edge edge-own" x1="460" y1="640" x2="600" y2="640" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="530" y="590" text-anchor="middle">metric API</text>

      <!-- HOT path: Fast api -> Materialised store -->
      <line class="edge-hot" x1="680" y1="600" x2="680" y2="482" marker-end="url(#ah-own)"/>
      <text class="edge-label hot-label" x="690" y="544" text-anchor="start">HOT · snapshot read · ~120ms p95</text>

      <!-- COLD path: Fast api -> Calc engine -->
      <line class="edge-cold" x1="760" y1="632" x2="810" y2="632" marker-end="url(#ah-data)"/>
      <text class="edge-label cold-label" x="785" y="590" text-anchor="middle">COLD · calc</text>

      <!-- Calc engine -> Normalised Facts store (read facts) -->
      <line class="edge-cold" x1="890" y1="600" x2="890" y2="315" marker-end="url(#ah-data)"/>
      <text class="edge-label cold-label" x="900" y="500" text-anchor="start">read source facts</text>

      <!-- Calc engine -> Materialisation queue (promote if pinned) -->
      <polyline class="edge edge-own edge-dash" points="840,600 840,566 305,566 305,480" marker-end="url(#ah-own)"/>
      <text class="edge-label" x="560" y="560" text-anchor="middle">promote if pinned</text>

      <!-- Validated result -> back to Fast api / BFF (lower track) -->
      <polyline class="edge-cold" points="1000,680 1000,698 680,698 680,682" marker-end="url(#ah-data)"/>
      <text class="edge-label cold-label" x="845" y="692" text-anchor="middle">validated result → BFF</text>

      <!-- ============ BOXES ============ -->

      <!-- EXTERNAL LANE -->
      <g>
        <rect class="card cat-ext" x="245" y="70" width="150" height="66" rx="12"/>
        <text class="box-title" x="320" y="98" text-anchor="middle">Source origins</text>
        <text class="box-sub" x="320" y="116" text-anchor="middle">data supply partners</text>
      </g>
      <g>
        <rect class="card cat-ext" x="425" y="70" width="150" height="66" rx="12"/>
        <text class="box-title" x="500" y="96" text-anchor="middle">Extractors</text>
        <text class="box-sub" x="500" y="113" text-anchor="middle">PDF · Excel · mailbox</text>
        <text class="box-sub" x="500" y="126" text-anchor="middle">Slack channels</text>
      </g>
      <g>
        <rect class="card cat-data" x="605" y="70" width="150" height="66" rx="12"/>
        <text class="box-title" x="680" y="98" text-anchor="middle">Data Lake</text>
        <text class="box-sub" x="680" y="116" text-anchor="middle">raw data + source facts</text>
      </g>

      <!-- INGESTION ROW (critical path: queue -> workers -> facts, with DLQ + replay) -->
      <g>
        <rect class="card cat-own" x="380" y="235" width="150" height="80" rx="13"/>
        <text class="box-title" x="455" y="261" text-anchor="middle">Ingestion Queue</text>
        <text class="box-sub" x="455" y="279" text-anchor="middle">at-least-once · ordered</text>
        <text class="box-sub" x="455" y="293" text-anchor="middle">retry + backoff</text>
      </g>
      <g>
        <rect class="card cat-own" x="600" y="235" width="160" height="80" rx="13"/>
        <text class="box-title" x="680" y="261" text-anchor="middle">Ingestion Workers</text>
        <text class="box-sub" x="680" y="279" text-anchor="middle">subscribe · dedupe</text>
        <text class="box-sub" x="680" y="293" text-anchor="middle">idempotent · normalise</text>
      </g>
      <g>
        <rect class="card cat-data" x="810" y="235" width="160" height="80" rx="13"/>
        <text class="box-title" x="890" y="263" text-anchor="middle">Normalised Facts</text>
        <text class="box-title" x="890" y="279" text-anchor="middle">Store</text>
        <text class="box-sub" x="890" y="297" text-anchor="middle">canonical source facts</text>
      </g>
      <!-- Dead-Letter Queue: failed events parked for inspection + replay -->
      <g>
        <rect class="card cat-ext" x="600" y="328" width="160" height="48" rx="11"/>
        <text class="box-title" x="680" y="349" text-anchor="middle" style="font-size:12px">Dead-Letter Queue</text>
        <text class="box-sub" x="680" y="365" text-anchor="middle">parked · inspect · replay</text>
      </g>

      <!-- MIDDLE ROW: definitions + materialisation -->
      <g>
        <rect class="card cat-own" x="60" y="400" width="150" height="80" rx="13"/>
        <text class="box-title" x="135" y="428" text-anchor="middle">Metric</text>
        <text class="box-title" x="135" y="444" text-anchor="middle">Definitions</text>
        <text class="box-sub" x="135" y="462" text-anchor="middle">scope · agg · rules</text>
      </g>
      <!-- combined: materialisation queue + snapshot worker -->
      <g>
        <rect class="card cat-own" x="250" y="400" width="310" height="80" rx="13"/>
        <line class="divider" x1="405" y1="410" x2="405" y2="470"/>
        <text class="box-title" x="327" y="432" text-anchor="middle">Materialisation</text>
        <text class="box-title" x="327" y="448" text-anchor="middle">Queue</text>
        <text class="box-sub" x="327" y="465" text-anchor="middle">def change · refresh</text>
        <text class="box-title" x="483" y="432" text-anchor="middle">Snapshot</text>
        <text class="box-title" x="483" y="448" text-anchor="middle">Worker</text>
        <text class="box-sub" x="483" y="465" text-anchor="middle">async · idempotent</text>
        <line class="edge edge-own" x1="388" y1="440" x2="424" y2="440" marker-end="url(#ah-own)"/>
      </g>
      <g>
        <rect class="card cat-data" x="600" y="400" width="160" height="80" rx="13"/>
        <text class="box-title" x="680" y="428" text-anchor="middle">Materialised</text>
        <text class="box-title" x="680" y="444" text-anchor="middle">Store</text>
        <text class="box-sub" x="680" y="462" text-anchor="middle">validated · lastCalcAt</text>
      </g>
      <g>
        <rect class="card cat-own" x="1000" y="400" width="170" height="80" rx="13"/>
        <text class="box-title" x="1085" y="428" text-anchor="middle">Notification</text>
        <text class="box-title" x="1085" y="444" text-anchor="middle">Service</text>
        <text class="box-sub" x="1085" y="462" text-anchor="middle">event-driven · push</text>
      </g>

      <!-- BOTTOM ROW: read paths -->
      <g>
        <rect class="card cat-ext" x="120" y="600" width="140" height="80" rx="13"/>
        <text class="box-title" x="190" y="635" text-anchor="middle">UI</text>
        <text class="box-sub" x="190" y="653" text-anchor="middle">dashboard · explore</text>
        <text class="box-sub" x="190" y="667" text-anchor="middle">verify / correct</text>
      </g>
      <g>
        <rect class="card cat-own" x="320" y="600" width="140" height="80" rx="13"/>
        <text class="box-title" x="390" y="635" text-anchor="middle">BFF</text>
        <text class="box-sub" x="390" y="653" text-anchor="middle">auth · shaping</text>
        <text class="box-sub" x="390" y="667" text-anchor="middle">Next.js</text>
      </g>
      <g>
        <rect class="card cat-own" x="600" y="600" width="160" height="80" rx="13"/>
        <text class="box-title" x="680" y="635" text-anchor="middle">Fast API</text>
        <text class="box-sub" x="680" y="653" text-anchor="middle">metric API · routing</text>
        <text class="box-sub" x="680" y="667" text-anchor="middle">hot vs cold decision</text>
      </g>
      <!-- combined: calculation engine + validation layer -->
      <g>
        <rect class="card cat-own" x="810" y="600" width="340" height="80" rx="13"/>
        <line class="divider" x1="980" y1="610" x2="980" y2="670"/>
        <text class="box-title" x="895" y="632" text-anchor="middle">Calculation</text>
        <text class="box-title" x="895" y="648" text-anchor="middle">Engine</text>
        <text class="box-sub" x="895" y="665" text-anchor="middle">server-side live calc</text>
        <text class="box-title" x="1065" y="632" text-anchor="middle">Validation</text>
        <text class="box-title" x="1065" y="648" text-anchor="middle">Layer</text>
        <text class="box-sub" x="1065" y="665" text-anchor="middle">golden fixtures</text>
        <line class="edge-cold" x1="958" y1="640" x2="996" y2="640" marker-end="url(#ah-data)"/>
      </g>
    </svg>
  </div>
</main>
</body>
</html>
